<div class="container mt-4" style="max-width: 650px;">
  <div class="card shadow">
    <div class="card-header text-white" [ngClass]="isEditMode ? 'bg-primary' : 'bg-success'">
      <h3 class="card-title mb-0">{{ isEditMode ? '📝 Editar' : '✨ Registrar' }} Producto</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="productForm" (ngSubmit)="save()">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Nombre del Producto:</label>
          <input type="text" formControlName="name" class="form-control" [ngClass]="{'is-invalid': productForm.get('name')?.touched && productForm.get('name')?.invalid}">
          <div class="invalid-feedback">El nombre es obligatorio y no puede superar los 100 caracteres.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Descripción:</label>
          <textarea formControlName="description" class="form-control" rows="2" [ngClass]="{'is-invalid': productForm.get('description')?.touched && productForm.get('description')?.invalid}"></textarea>
          <div class="invalid-feedback">La descripción es obligatoria.</div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Presentación:</label>
            <input type="text" formControlName="presentation" class="form-control" placeholder="Ej. Frasco 500ml" [ngClass]="{'is-invalid': productForm.get('presentation')?.touched && productForm.get('presentation')?.invalid}">
            <div class="invalid-feedback">La presentación es obligatoria.</div>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Stock:</label>
            <input type="number" formControlName="stock" class="form-control" [ngClass]="{'is-invalid': productForm.get('stock')?.touched && productForm.get('stock')?.invalid}">
            <div class="invalid-feedback">Mínimo 0.</div>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Precio (S/.):</label>
            <input type="number" step="0.01" formControlName="unitPrice" class="form-control" [ngClass]="{'is-invalid': productForm.get('unitPrice')?.touched && productForm.get('unitPrice')?.invalid}">
            <div class="invalid-feedback">Mínimo 0.</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Categoría:</label>
          <select [compareWith]="compareObjects" formControlName="category" class="form-select" [ngClass]="{'is-invalid': productForm.get('category')?.touched && productForm.get('category')?.invalid}">
            <option [ngValue]="null">-- Seleccione una Categoría --</option>
            <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.name }}</option>
          </select>
          <div class="invalid-feedback">Debe asociar una categoría.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Familia:</label>
          <select [compareWith]="compareObjects" formControlName="family" class="form-select" [ngClass]="{'is-invalid': productForm.get('family')?.touched && productForm.get('family')?.invalid}">
            <option [ngValue]="null">-- Seleccione una Familia --</option>
            <option *ngFor="let fam of families" [ngValue]="fam">{{ fam.name }}</option>
          </select>
          <div class="invalid-feedback">Debe asociar una familia.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Laboratorio:</label>
          <select [compareWith]="compareObjects" formControlName="laboratory" class="form-select" [ngClass]="{'is-invalid': productForm.get('laboratory')?.touched && productForm.get('laboratory')?.invalid}">
            <option [ngValue]="null">-- Seleccione un Laboratorio --</option>
            <option *ngFor="let lab of laboratories" [ngValue]="lab">{{ lab.name }}</option>
          </select>
          <div class="invalid-feedback">Debe asociar un laboratorio.</div>
        </div>

        <div class="form-check form-switch mb-4">
          <input type="checkbox" formControlName="expired" id="expired" class="form-check-input" role="switch">
          <label for="expired" class="form-check-label fw-bold text-danger">¿El producto está expirado?</label>
        </div>

        <div class="d-flex justify-content-end">
          <a routerLink="/product" class="btn btn-secondary me-2">Cancelar</a>
          <button type="submit" class="btn btn-success" [disabled]="productForm.invalid">💾 Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
